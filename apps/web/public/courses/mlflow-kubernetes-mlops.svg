<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1120"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="mlflow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0194e2"/>
      <stop offset="100%" stop-color="#43b9f9"/>
    </linearGradient>
    <linearGradient id="k8s" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#326ce5"/>
      <stop offset="100%" stop-color="#4a8af4"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#326ce5" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#326ce5" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#334155" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="75" x2="800" y2="75"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="225" x2="800" y2="225"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="375" x2="800" y2="375"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
  </g>

  <!-- Glow behind icon -->
  <circle cx="400" cy="160" r="130" fill="url(#glow)"/>

  <!-- Kubernetes helm wheel (7 spokes) -->
  <g transform="translate(400, 155)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="65" fill="none" stroke="#326ce5" stroke-width="3" opacity="0.6"/>
    <!-- Inner circle -->
    <circle cx="0" cy="0" r="18" fill="url(#k8s)" opacity="0.8"/>
    <!-- Spokes -->
    <g stroke="#326ce5" stroke-width="4" stroke-linecap="round" opacity="0.7">
      <line x1="0" y1="-22" x2="0" y2="-60"/>
      <line x1="20" y1="-10" x2="55" y2="-28"/>
      <line x1="20" y1="10" x2="55" y2="28"/>
      <line x1="0" y1="22" x2="0" y2="60"/>
      <line x1="-20" y1="10" x2="-55" y2="28"/>
      <line x1="-20" y1="-10" x2="-55" y2="-28"/>
    </g>
    <!-- Spoke end caps -->
    <g fill="#326ce5" opacity="0.8">
      <circle cx="0" cy="-63" r="6"/>
      <circle cx="57" cy="-30" r="6"/>
      <circle cx="57" cy="30" r="6"/>
      <circle cx="0" cy="63" r="6"/>
      <circle cx="-57" cy="30" r="6"/>
      <circle cx="-57" cy="-30" r="6"/>
    </g>
  </g>

  <!-- ML flow icon overlay (experiment beaker/flask) -->
  <g transform="translate(400, 155)" opacity="0.95">
    <path d="M-6 -10 L-6 -2 L-14 12 C-15 14 -14 16 -12 16 L12 16 C14 16 15 14 14 12 L6 -2 L6 -10Z" fill="#0194e2" stroke="#43b9f9" stroke-width="1"/>
    <line x1="-8" y1="-10" x2="8" y2="-10" stroke="#43b9f9" stroke-width="2" stroke-linecap="round"/>
    <!-- Liquid -->
    <path d="M-10 10 L10 10 L14 16 C15 18 14 16 -14 16Z" fill="#43b9f9" opacity="0.4"/>
    <!-- Bubbles -->
    <circle cx="-3" cy="8" r="2" fill="#43b9f9" opacity="0.6"/>
    <circle cx="4" cy="5" r="1.5" fill="#43b9f9" opacity="0.5"/>
  </g>

  <!-- ML Pipeline arrows (left side) -->
  <g opacity="0.4">
    <rect x="100" y="100" width="70" height="32" rx="4" fill="#1e293b" stroke="#0194e2" stroke-width="1"/>
    <text x="135" y="120" text-anchor="middle" font-family="monospace" font-size="10" fill="#43b9f9">Train</text>
    <rect x="100" y="150" width="70" height="32" rx="4" fill="#1e293b" stroke="#0194e2" stroke-width="1"/>
    <text x="135" y="170" text-anchor="middle" font-family="monospace" font-size="10" fill="#43b9f9">Track</text>
    <rect x="100" y="200" width="70" height="32" rx="4" fill="#1e293b" stroke="#0194e2" stroke-width="1"/>
    <text x="135" y="220" text-anchor="middle" font-family="monospace" font-size="10" fill="#43b9f9">Registry</text>
    <!-- Arrows -->
    <path d="M135 132 L135 150" stroke="#0194e2" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <path d="M135 182 L135 200" stroke="#0194e2" stroke-width="1.5"/>
    <!-- Connection to center -->
    <line x1="170" y1="166" x2="330" y2="155" stroke="#0194e2" stroke-width="1" stroke-dasharray="5 4"/>
  </g>

  <!-- Deploy pipeline (right side) -->
  <g opacity="0.4">
    <rect x="630" y="100" width="70" height="32" rx="4" fill="#1e293b" stroke="#326ce5" stroke-width="1"/>
    <text x="665" y="120" text-anchor="middle" font-family="monospace" font-size="10" fill="#60a5fa">Deploy</text>
    <rect x="630" y="150" width="70" height="32" rx="4" fill="#1e293b" stroke="#326ce5" stroke-width="1"/>
    <text x="665" y="170" text-anchor="middle" font-family="monospace" font-size="10" fill="#60a5fa">Scale</text>
    <rect x="630" y="200" width="70" height="32" rx="4" fill="#1e293b" stroke="#326ce5" stroke-width="1"/>
    <text x="665" y="220" text-anchor="middle" font-family="monospace" font-size="10" fill="#60a5fa">Monitor</text>
    <!-- Arrows -->
    <path d="M665 132 L665 150" stroke="#326ce5" stroke-width="1.5"/>
    <path d="M665 182 L665 200" stroke="#326ce5" stroke-width="1.5"/>
    <!-- Connection to center -->
    <line x1="630" y1="166" x2="470" y2="155" stroke="#326ce5" stroke-width="1" stroke-dasharray="5 4"/>
  </g>

  <!-- Code snippet hint -->
  <g transform="translate(260, 255)" opacity="0.25">
    <text font-family="monospace" font-size="11" fill="#43b9f9">mlflow.log_model(model,</text>
    <text y="16" font-family="monospace" font-size="11" fill="#94a3b8">  "k8s-deployment")</text>
  </g>

  <!-- Title -->
  <text x="400" y="335" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="white" letter-spacing="-0.5">MLflow for Kubernetes</text>
  <text x="400" y="370" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94a3b8">Deploy and manage ML models at scale</text>

  <!-- Badge -->
  <rect x="325" y="385" width="150" height="28" rx="14" fill="#326ce5" opacity="0.15"/>
  <text x="400" y="404" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#60a5fa">INTERMEDIATE</text>
</svg>
