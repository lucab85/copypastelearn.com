<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1120"/>
      <stop offset="100%" stop-color="#1a1040"/>
    </linearGradient>
    <linearGradient id="claw" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#334155" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="75" x2="800" y2="75"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="225" x2="800" y2="225"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="375" x2="800" y2="375"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
  </g>

  <!-- Glow effect -->
  <ellipse cx="400" cy="200" rx="200" ry="180" fill="url(#glow)"/>

  <!-- Claw / agent icon -->
  <g transform="translate(340, 110)">
    <!-- Robot body -->
    <rect x="20" y="30" width="80" height="70" rx="12" fill="url(#claw)" opacity="0.9"/>
    <!-- Head -->
    <rect x="30" y="0" width="60" height="40" rx="10" fill="url(#claw)"/>
    <!-- Eyes -->
    <circle cx="48" cy="18" r="6" fill="#0b1120"/>
    <circle cx="72" cy="18" r="6" fill="#0b1120"/>
    <circle cx="48" cy="17" r="3" fill="#22d3ee"/>
    <circle cx="72" cy="17" r="3" fill="#22d3ee"/>
    <!-- Antenna -->
    <line x1="60" y1="0" x2="60" y2="-12" stroke="#a855f7" stroke-width="2"/>
    <circle cx="60" cy="-15" r="4" fill="#22d3ee"/>
    <!-- Arms (claws) -->
    <path d="M15 50 L0 40 L-5 50 L10 55Z" fill="url(#claw)" opacity="0.8"/>
    <path d="M105 50 L120 40 L125 50 L110 55Z" fill="url(#claw)" opacity="0.8"/>
    <!-- Shield overlay -->
    <path d="M60 108 L35 95 L35 75 L60 68 L85 75 L85 95Z" fill="none" stroke="url(#shield)" stroke-width="2.5" opacity="0.8"/>
    <path d="M52 88 L58 94 L72 80" fill="none" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Connection lines (tools) -->
  <g stroke="#a855f7" stroke-width="1" opacity="0.4">
    <line x1="280" y1="170" x2="220" y2="140"/>
    <line x1="520" y1="170" x2="580" y2="140"/>
    <line x1="280" y1="220" x2="200" y2="260"/>
    <line x1="520" y1="220" x2="600" y2="260"/>
  </g>

  <!-- Tool nodes -->
  <circle cx="210" cy="135" r="14" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="210" y="139" text-anchor="middle" fill="#a855f7" font-size="12" font-family="monospace">🔍</text>

  <circle cx="590" cy="135" r="14" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="590" y="139" text-anchor="middle" fill="#a855f7" font-size="12" font-family="monospace">✉️</text>

  <circle cx="190" cy="265" r="14" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="190" y="269" text-anchor="middle" fill="#22d3ee" font-size="12" font-family="monospace">🔒</text>

  <circle cx="610" cy="265" r="14" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="610" y="269" text-anchor="middle" fill="#22d3ee" font-size="12" font-family="monospace">⚙️</text>

  <!-- Title -->
  <text x="400" y="340" text-anchor="middle" fill="white" font-size="30" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">
    OpenClaw Agent
  </text>

  <!-- Subtitle -->
  <text x="400" y="370" text-anchor="middle" fill="#94a3b8" font-size="16" font-family="system-ui, -apple-system, sans-serif">
    Build &amp; Secure in 60 Minutes
  </text>

  <!-- Badge -->
  <rect x="330" y="390" width="140" height="28" rx="14" fill="#7c3aed" opacity="0.3"/>
  <text x="400" y="409" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600" font-family="system-ui, sans-serif">
    AUTONOMOUS AI
  </text>
</svg>
