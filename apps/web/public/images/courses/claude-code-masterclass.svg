<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0f05"/>
      <stop offset="100%" stop-color="#2a1505"/>
    </linearGradient>
    <linearGradient id="claude" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#52341a" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="75" x2="800" y2="75"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="225" x2="800" y2="225"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="375" x2="800" y2="375"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
  </g>

  <!-- Glow effect -->
  <ellipse cx="400" cy="190" rx="220" ry="170" fill="url(#glow)"/>

  <!-- Terminal window -->
  <g transform="translate(255, 80)">
    <rect x="0" y="0" width="290" height="170" rx="14" fill="#0d0a06" stroke="#f59e0b" stroke-width="1.5" opacity="0.95"/>
    <!-- Title bar -->
    <rect x="0" y="0" width="290" height="30" rx="14" fill="#1a130a"/>
    <rect x="0" y="16" width="290" height="14" fill="#1a130a"/>
    <circle cx="20" cy="15" r="5" fill="#ff5f57"/>
    <circle cx="40" cy="15" r="5" fill="#febc2e"/>
    <circle cx="60" cy="15" r="5" fill="#28c840"/>
    <text x="270" y="19" text-anchor="end" fill="#a8743a" font-size="10" font-family="monospace">claude</text>
    <!-- Prompt lines -->
    <text x="18" y="58" fill="#fbbf24" font-size="13" font-family="monospace">&gt; claude "ship the feature"</text>
    <text x="18" y="84" fill="#94a3b8" font-size="12" font-family="monospace">● Planning the task…</text>
    <text x="18" y="106" fill="#94a3b8" font-size="12" font-family="monospace">● Editing 4 files…</text>
    <text x="18" y="128" fill="#94a3b8" font-size="12" font-family="monospace">● Running tests…</text>
    <text x="18" y="152" fill="#34d399" font-size="12" font-family="monospace">✓ 12 passed · committed</text>
  </g>

  <!-- Workflow nodes around the terminal -->
  <g stroke="#f59e0b" stroke-width="1" opacity="0.4">
    <line x1="255" y1="120" x2="190" y2="135"/>
    <line x1="545" y1="120" x2="610" y2="135"/>
    <line x1="255" y1="210" x2="190" y2="265"/>
    <line x1="545" y1="210" x2="610" y2="265"/>
  </g>

  <circle cx="180" cy="135" r="15" fill="#1e1408" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="180" y="140" text-anchor="middle" fill="#f59e0b" font-size="13" font-family="monospace">📝</text>

  <circle cx="620" cy="135" r="15" fill="#1e1408" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="620" y="140" text-anchor="middle" fill="#f59e0b" font-size="13" font-family="monospace">🧪</text>

  <circle cx="180" cy="265" r="15" fill="#1e1408" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="180" y="270" text-anchor="middle" fill="#fbbf24" font-size="13" font-family="monospace">🔀</text>

  <circle cx="620" cy="265" r="15" fill="#1e1408" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="620" y="270" text-anchor="middle" fill="#fbbf24" font-size="13" font-family="monospace">🚀</text>

  <!-- Title -->
  <text x="400" y="330" text-anchor="middle" fill="white" font-size="30" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">
    Claude Code Masterclass
  </text>

  <!-- Subtitle -->
  <text x="400" y="362" text-anchor="middle" fill="#d6a25f" font-size="16" font-family="system-ui, -apple-system, sans-serif">
    Ship Real Code with AI
  </text>

  <!-- Badge -->
  <rect x="312" y="384" width="176" height="28" rx="14" fill="#d97706" opacity="0.3"/>
  <text x="400" y="403" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="600" font-family="system-ui, sans-serif">
    AI-ASSISTED DEVELOPMENT
  </text>
</svg>
