name: Lighthouse

on:
  # Run against the Vercel deployment for this commit / PR.
  deployment_status:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to audit (defaults to production)'
        required: false
        default: 'https://www.copypastelearn.com'

concurrency:
  group: lighthouse-${{ github.workflow }}-${{ github.event.deployment_status.deployment.environment || github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse CI (desktop)
    # Only run on manual dispatch, or when Vercel reports a successful
    # *production* deployment. Preview deployments are protected by Vercel
    # SSO, so Lighthouse would otherwise audit the vercel.com/login redirect
    # instead of the actual site.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'deployment_status' &&
       github.event.deployment_status.state == 'success' &&
       github.event.deployment_status.environment == 'Production')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Resolve target URL
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            URL="${{ github.event.inputs.url }}"
          else
            # Always audit the canonical production hostname rather than the
            # per-deployment vercel.app URL — the latter is sometimes still
            # protected and 'www.copypastelearn.com' is what users actually hit.
            URL="https://www.copypastelearn.com"
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Auditing: $URL"

      - name: Run Lighthouse CI
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
          TARGET_URL: ${{ steps.target.outputs.url }}
        run: |
          npx --yes @lhci/cli@latest autorun \
            --collect.settings.preset=desktop \
            --collect.url="$TARGET_URL/" \
            --collect.url="$TARGET_URL/blog" \
            --collect.url="$TARGET_URL/courses" \
            --collect.url="$TARGET_URL/about"

      - name: Dump failing best-practices audits
        if: always()
        run: |
          shopt -s nullglob
          files=(.lighthouseci/lhr-*.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No lhr-*.json found in .lighthouseci"
            ls -la .lighthouseci 2>/dev/null || echo "(no .lighthouseci dir)"
            exit 0
          fi
          for f in "${files[@]}"; do
            echo "=== $f ==="
            node -e "
              const r = require('./$f');
              console.log('URL:', r.finalDisplayedUrl || r.finalUrl);
              for (const cat of Object.values(r.categories)) {
                console.log('  ['+cat.id+'] score=', cat.score);
              }
              const bp = r.categories['best-practices'];
              console.log('  -- best-practices weighted audits --');
              for (const a of bp.auditRefs) {
                const x = r.audits[a.id];
                if (a.weight > 0 && x && x.score !== null && x.score < 1) {
                  console.log('    [w='+a.weight+']', a.id, 'score='+x.score, '—', x.title);
                  if (x.details && x.details.items && x.details.items.length) {
                    console.log('      items:', JSON.stringify(x.details.items).slice(0, 800));
                  }
                }
              }
            "
          done

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci
          if-no-files-found: ignore
          retention-days: 14
