name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# The full Next.js build runs on Vercel for every push and PR, so this
# workflow only provides a fast lint+typecheck pre-merge gate.
jobs:
  lint-typecheck:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: TypeScript
        run: pnpm -r exec tsc --noEmit

      - name: SEO meta verification
        run: pnpm --filter @copypastelearn/web run seo:verify-meta

      - name: noindex verification
        run: pnpm --filter @copypastelearn/web run seo:verify-noindex
