name: Playwright E2E

on:
  # Run against the Vercel deployment for this commit / PR.
  deployment_status:
  workflow_dispatch:
    inputs:
      url:
        description: 'Base URL to test against (defaults to production)'
        required: false
        default: 'https://www.copypastelearn.com'

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.event.deployment_status.deployment.environment || github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright (chromium)
    # Only run on manual dispatch, or when Vercel reports a successful
    # *production* deployment. Preview deployments are protected by Vercel
    # SSO so Playwright cannot reach them without a bypass token.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'deployment_status' &&
       github.event.deployment_status.state == 'success' &&
       github.event.deployment_status.environment == 'Production')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium

      - name: Resolve target URL
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            URL="${{ github.event.inputs.url }}"
          else
            URL="https://www.copypastelearn.com"
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Testing: $URL"

      - name: Run Playwright tests
        working-directory: apps/web
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.target.outputs.url }}
          E2E_PRODUCT_SLUG: ${{ vars.E2E_PRODUCT_SLUG }}
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: apps/web/test-results
          if-no-files-found: ignore
          retention-days: 14
